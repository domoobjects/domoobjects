<!doctype html>

<head>
<meta charset="UTF-8" />

<title>Department of Miscellaneous Objects</title>

<style>
:root{
  --text: rgba(255,255,255,0.92);
  --hover-blue:#0b1f3a;
  --maxw:1200px;
}

*{ box-sizing:border-box; }
html,body{ height:100%; }

body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  background:#fff;
  color:#111;
  overflow-x:hidden;
}

/* ===== HOVER ===== */
a,.brand{ transition:color .25s ease; }
a:hover,.brand:hover{ color:var(--hover-blue); }

img{ transition:filter .25s ease; }
img:hover{ filter:brightness(0.95) saturate(1.15); }

/* make clickable objects feel clickable */
.object-link{
  display:block;
  line-height:0;
  cursor:pointer;
}

/* ===== NAV ===== */
.nav{
  position:fixed;
  top:0;left:0;right:0;
  padding:28px 42px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  z-index:50;
  pointer-events:none;
}
.nav *{ pointer-events:auto; }

.brand{
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--text);
}
.brand .small{
  font-size:14px;
  font-weight:600;
}
.brand .big{
  margin-top:6px;
  font-size:40px;
  font-weight:800;
}

.menu{
  display:flex;
  gap:46px;
  text-transform:uppercase;
  letter-spacing:0.12em;
  font-size:12px;
  color:var(--text);
}
.menu a{
  color:inherit;
  text-decoration:none;
}

/* ===== HERO ===== */
.hero-wrap{
  height:240vh;
  position:relative;
  background:#000;
}
.hero-sticky{
  position:sticky;
  top:0;
  height:100vh;
  overflow:hidden;
}
.hero-img{
  position:absolute;
  inset:0;
  background:
    radial-gradient(80% 80% at 50% 50%, rgba(0,0,0,0.0), rgba(0,0,0,0.35)),
    url("https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1600&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
  transform:translate3d(0,0,0) scale(1);
  will-change:transform;
}
.scroll-hint{
  position:absolute;
  left:42px;
  bottom:30px;
  color:rgba(255,255,255,0.75);
  font-size:12px;
  letter-spacing:0.12em;
  text-transform:uppercase;
}

/* ===== GRID ===== */
.section{
  padding:90px 0 120px;
}

.container{
  width:min(var(--maxw),100%);
  margin:0 auto;
  padding-left:120px;
  padding-right:120px;
}

.objects-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:70px 90px;
  justify-items:center;
}

.object-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}

.object-img{
  width:100%;
  max-width:260px;
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
}

.object-img img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

/* ===== ABOUT ===== */
.about{
  padding:140px 0 120px;
}
.about h2{
  font-size:14px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  opacity:0.7;
}
.about p{
  max-width:820px;
  line-height:1.8;
  opacity:0.85;
}

/* ===== FOOTER ===== */
.footer-banner{
  position:relative;
  padding:80px 0;
  background:
    linear-gradient(0deg, rgba(0,0,0,0.2), rgba(0,0,0,0.2)),
    #3a2a20;
  overflow:hidden;
}

.footer-inner{
  width:min(var(--maxw),100%);
  margin:0 auto;
  padding-left:120px;
  padding-right:120px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  color:white;
}

.footer-left .small{
  text-transform:uppercase;
  font-size:14px;
  letter-spacing:0.08em;
}
.footer-left .big{
  font-size:44px;
  font-weight:900;
  margin-top:8px;
  text-transform:uppercase;
}

.footer-links{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:8px;
  font-size:13px;
}

.footer-links a{
  color:white;
  text-decoration:none;
}

.octopus{
  position:absolute;
  right:60px;
  bottom:20px;
  width:300px;
  opacity:0.9;
}
.octopus svg{ width:100%; }
.octopus path{
  stroke:white;
  stroke-width:2;
  fill:none;
}
</style>
</head>

<script>
const heroWrap=document.querySelector('.hero-wrap');
const heroImg=document.querySelector('.hero-img');

function clamp(n,min,max){return Math.max(min,Math.min(max,n));}

function onScroll(){
  const rect=heroWrap.getBoundingClientRect();
  const viewH=window.innerHeight;
  const total=heroWrap.offsetHeight-viewH;
  const scrolled=clamp(-rect.top,0,total);
  const t=total>0?(scrolled/total):0;

  const scale=1+(t*0.18);
  const y=(t*22);
  heroImg.style.transform=`translate3d(0,${y}px,0) scale(${scale})`;
}
window.addEventListener('scroll',onScroll);
window.addEventListener('resize',onScroll);
onScroll();
</script>
