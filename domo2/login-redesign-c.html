<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#080808;--panel:#0e0e0e;--ink:#e8e8e8;--dim:#444;--faint:rgba(255,255,255,.06);--accent:#e8e8e8;}
body{background:var(--bg);color:var(--ink);font-family:'Space Mono',monospace;min-height:100vh;}

/* GRID LINES BACKGROUND */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;z-index:0;}

/* NAV */
nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid var(--faint);}
.brand{text-decoration:none;display:flex;align-items:center;}
.brand-logo{height:36px;width:auto;display:block;}
.nav-back{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .15s;}
.nav-back:hover{color:var(--ink);}

/* FULL CENTER LAYOUT */
.center{position:relative;z-index:10;min-height:calc(100vh - 77px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;}

/* BIG BRAND BEHIND */
.bg-brand{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Anton',sans-serif;font-size:clamp(120px,15vw,200px);letter-spacing:-.04em;text-transform:uppercase;color:rgba(255,255,255,.025);white-space:nowrap;pointer-events:none;z-index:1;user-select:none;}

/* FORM CARD */
.card{background:var(--panel);border:1px solid rgba(255,255,255,.1);padding:48px;width:100%;max-width:460px;position:relative;z-index:10;}
.card::before{content:'';position:absolute;top:-1px;left:40px;right:40px;height:2px;background:linear-gradient(90deg,transparent,var(--ink),transparent);}

.mode-row{display:flex;gap:0;border:1px solid var(--faint);margin-bottom:36px;}
.mode-btn{flex:1;padding:12px;font-family:'Space Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;background:transparent;border:none;cursor:pointer;color:var(--dim);transition:all .15s;}
.mode-btn.active{background:var(--ink);color:var(--bg);}

.form-title{font-family:'Anton',sans-serif;font-size:36px;text-transform:uppercase;letter-spacing:.02em;color:var(--ink);margin-bottom:4px;}
.form-sub{font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:28px;line-height:2;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;}
.field input{width:100%;background:#111;border:1px solid rgba(255,255,255,.1);color:var(--ink);padding:14px 16px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.04em;outline:none;transition:border-color .15s;}
.field input:focus{border-color:rgba(255,255,255,.35);}
.field input::placeholder{color:#2a2a2a;}
.btn-submit{width:100%;background:var(--ink);color:var(--bg);border:none;padding:18px;font-family:'Anton',sans-serif;font-size:22px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background .12s;margin-top:8px;position:relative;overflow:hidden;}
.btn-submit::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transform:translateX(-100%);transition:transform .4s;}
.btn-submit:hover::after{transform:translateX(100%);}
.btn-submit:hover{background:#fff;}
.btn-submit:disabled{background:#1a1a1a;color:#333;cursor:not-allowed;}
.btn-submit:disabled::after{display:none;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-line{flex:1;height:1px;background:var(--faint);}
.divider-txt{font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#2a2a2a;}
.btn-google{width:100%;background:transparent;color:var(--ink);border:1px solid var(--faint);padding:14px;font-family:'Space Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-google:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.04);}
.google-icon{width:14px;height:14px;flex-shrink:0;}
.form-error{font-size:9px;letter-spacing:.06em;color:#ff4444;margin-top:12px;display:none;}
.form-error.show{display:block;}

/* stat row below card */
.card-foot{display:flex;gap:0;margin-top:1px;border:1px solid rgba(255,255,255,.1);border-top:none;width:100%;max-width:460px;}
.cstat{flex:1;padding:10px 16px;text-align:center;border-right:1px solid rgba(255,255,255,.07);}
.cstat:last-child{border-right:none;}
.cstat-n{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--ink);}
.cstat-l{font-size:7px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);}

/* logged in */
.li-panel{display:none;text-align:center;width:100%;max-width:460px;background:var(--panel);border:1px solid rgba(255,255,255,.1);padding:48px;}
.li-av{width:72px;height:72px;border-radius:50%;background:#1a1a1a;border:1px solid var(--faint);display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:28px;color:var(--ink);margin:0 auto 20px;}
.li-name{font-family:'Anton',sans-serif;font-size:28px;text-transform:uppercase;color:var(--ink);margin-bottom:4px;}
.li-email{font-size:9px;color:var(--dim);letter-spacing:.1em;margin-bottom:28px;}
.btn-profile{display:block;background:var(--ink);color:var(--bg);padding:16px;font-family:'Anton',sans-serif;font-size:20px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;text-align:center;margin-bottom:10px;}
.btn-signout{background:transparent;color:var(--dim);border:1px solid var(--faint);padding:12px;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .15s;width:100%;}
.btn-signout:hover{color:#ff4444;}
@media(max-width:540px){.card{padding:32px 24px;}.center{padding:32px 16px;}}
</style>

  animation: signalBar 400ms cubic-bezier(0.16, 1, 0.3, 1) forwards;

}
