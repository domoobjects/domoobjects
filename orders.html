<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surveillance — DOMO</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0b;
      overflow: hidden;
      font-family: 'IBM Plex Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #surveillance-header {
      height: 48px;
      background: #0a0a09;
      border-bottom: 0.5px solid #1e1e1c;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
      z-index: 10;
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #dept-logo {
      height: 20px;
      width: auto;
      opacity: 0.4;
    }

    #dept-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: 3px;
      color: #2a2a28;
      text-transform: uppercase;
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    #live-clock {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: #3a3a38;
    }

    .domo-back-btn {
      position: fixed;
      bottom: 28px;
      left: 36px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: 3px;
      color: #3a3a38;
      text-transform: uppercase;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 100;
      transition: color 300ms;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .domo-back-btn:hover { color: #c1121f; }
    .domo-back-btn::before {
      content: '';
      display: block;
      width: 20px;
      height: 0.5px;
      background: currentColor;
      transition: width 300ms;
    }
    .domo-back-btn:hover::before { width: 30px; }

    #exit-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: 3px;
      color: #2a2a28;
      text-transform: uppercase;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 200ms;
    }
    #exit-btn:hover { color: #c1121f; }

    #surveillance-grid {
      flex: 1;
      display: grid;
      gap: 2px;
      padding: 2px;
      background: #000;
      overflow: hidden;
    }

    .cctv-cell {
      position: relative;
      background: #080808;
      overflow: hidden;
      cursor: pointer;
    }

    .cctv-cell:hover .cell-overlay { opacity: 1; }

    .cell-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.15;
    }

    .cell-scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.02) 2px,
        rgba(255,255,255,0.02) 4px
      );
      pointer-events: none;
    }

    .cell-timestamp {
      position: absolute;
      top: 8px;
      left: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 7px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.5);
      z-index: 3;
    }

    .cell-cam-label {
      position: absolute;
      top: 8px;
      right: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 7px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.3);
      z-index: 3;
    }

    .cell-object-name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(14px, 2.5vw, 28px);
      letter-spacing: 3px;
      color: rgba(255,255,255,0.7);
      text-align: center;
      z-index: 3;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
      width: 80%;
    }

    .cell-object-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.2;
      filter: grayscale(100%) contrast(1.2);
      z-index: 1;
    }

    .cell-status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 3;
    }

    .cell-status {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 7px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .status-transit {
      color: #c1121f;
      animation: statusBlink 1.4s ease-in-out infinite;
    }

    .status-delivered { color: #3a5a3a; }

    @keyframes statusBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .cell-case-number {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 7px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.2);
    }

    .cell-overlay {
      position: absolute;
      inset: 0;
      border: 0.5px solid rgba(193,18,31,0.4);
      opacity: 0;
      transition: opacity 200ms;
      z-index: 4;
      pointer-events: none;
    }

    #no-orders {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #no-orders-cell {
      width: 320px;
      height: 240px;
      position: relative;
      border: 0.5px solid #1e1e1c;
    }

    #no-signal-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.2;
    }

    #no-signal-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 4px;
      color: #3a3a38;
      text-align: center;
      animation: statusBlink 2s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <div id="surveillance-header">
    <div id="header-left">
      <img src="favicon.png" id="dept-logo">
      <span id="dept-label">DEPT. SURVEILLANCE SYSTEM</span>
    </div>
    <div id="header-right">
      <span id="live-clock"></span>
      <button id="exit-btn">[ EXIT SURVEILLANCE ]</button>
      <button class="domo-back-btn" style="bottom:60px;" onclick="window.location.href='index.html'">return to department</button>
    </div>
  </div>

  <div id="surveillance-grid"></div>

  <div id="no-orders" style="display:none;">
    <div id="no-orders-cell">
      <canvas id="no-signal-canvas"></canvas>
      <div id="no-signal-text">NO ACTIVE SURVEILLANCE</div>
    </div>
  </div>

  <script>
  var firebaseConfig = {
    apiKey: "AIzaSyA6_5oWBRKZLnZhTsjtfepm2NleAEEsrPA",
    authDomain: "domo-8cfe1.firebaseapp.com",
    projectId: "domo-8cfe1",
    storageBucket: "domo-8cfe1.firebasestorage.app",
    messagingSenderId: "47790816831",
    appId: "1:47790816831:web:0a92e160fc595d5a9c428a"
  };

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  var db   = firebase.firestore();
  var auth = firebase.auth();

  /* ── Live clock ── */
  function updateClock() {
    var now = new Date();
    var formatted = now.getFullYear() + '-' +
      String(now.getMonth()+1).padStart(2,'0') + '-' +
      String(now.getDate()).padStart(2,'0') + ' ' +
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0') + ':' +
      String(now.getSeconds()).padStart(2,'0');
    var el = document.getElementById('live-clock');
    if (el) el.textContent = formatted;
  }
  setInterval(updateClock, 1000);
  updateClock();

  /* ── Static noise ── */
  function drawCellNoise(canvas) {
    var ctx = canvas.getContext('2d');
    function animate() {
      var w = canvas.width  = canvas.offsetWidth;
      var h = canvas.height = canvas.offsetHeight;
      var imageData = ctx.createImageData(w, h);
      for (var i = 0; i < imageData.data.length; i += 4) {
        var v = Math.random() * 255;
        imageData.data[i]   = v;
        imageData.data[i+1] = v;
        imageData.data[i+2] = v;
        imageData.data[i+3] = 255;
      }
      ctx.putImageData(imageData, 0, 0);
      requestAnimationFrame(animate);
    }
    animate();
  }

  /* ── Grid layout ── */
  function setGridLayout(count) {
    var grid = document.getElementById('surveillance-grid');
    if (count === 1) {
      grid.style.gridTemplateColumns = '1fr';
      grid.style.gridTemplateRows    = '1fr';
    } else if (count === 2) {
      grid.style.gridTemplateColumns = '1fr 1fr';
      grid.style.gridTemplateRows    = '1fr';
    } else if (count === 3) {
      grid.style.gridTemplateColumns = '1fr 1fr 1fr';
      grid.style.gridTemplateRows    = '1fr';
    } else if (count === 4) {
      grid.style.gridTemplateColumns = '1fr 1fr';
      grid.style.gridTemplateRows    = '1fr 1fr';
    } else if (count <= 6) {
      grid.style.gridTemplateColumns = '1fr 1fr 1fr';
      grid.style.gridTemplateRows    = '1fr 1fr';
    } else {
      grid.style.gridTemplateColumns = 'repeat(4, 1fr)';
      grid.style.gridTemplateRows    = 'repeat(auto-fill, 1fr)';
    }
  }

  function formatOrderDate(timestamp) {
    if (!timestamp) return '0000-00-00 00:00:00';
    var d = new Date(timestamp.seconds * 1000);
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0') + ' ' +
      String(d.getHours()).padStart(2,'0') + ':' +
      String(d.getMinutes()).padStart(2,'0') + ':' +
      String(d.getSeconds()).padStart(2,'0');
  }

  function createCCTVCell(order, index) {
    var cell = document.createElement('div');
    cell.className = 'cctv-cell';

    var canvas = document.createElement('canvas');
    canvas.className = 'cell-canvas';
    cell.appendChild(canvas);

    var scanlines = document.createElement('div');
    scanlines.className = 'cell-scanlines';
    cell.appendChild(scanlines);

    var timestamp = document.createElement('div');
    timestamp.className = 'cell-timestamp';
    timestamp.textContent = formatOrderDate(order.orderDate);
    cell.appendChild(timestamp);

    var camLabel = document.createElement('div');
    camLabel.className = 'cell-cam-label';
    camLabel.textContent = 'CAM-' + String(index + 1).padStart(2, '0');
    cell.appendChild(camLabel);

    var firstItem = order.items && order.items[0];

    if (firstItem && firstItem.image) {
      var img = document.createElement('img');
      img.className = 'cell-object-img';
      img.src = firstItem.image;
      img.alt = firstItem.name || '';
      cell.appendChild(img);
    }

    var objectName = document.createElement('div');
    objectName.className = 'cell-object-name';
    objectName.textContent = firstItem
      ? (firstItem.name || 'UNKNOWN OBJECT').toUpperCase()
      : 'UNKNOWN OBJECT';
    cell.appendChild(objectName);

    var statusBar = document.createElement('div');
    statusBar.className = 'cell-status-bar';

    var statusEl = document.createElement('div');
    statusEl.className = 'cell-status ' + (order.status === 'DELIVERED' ? 'status-delivered' : 'status-transit');
    statusEl.textContent = order.status === 'DELIVERED'
      ? '● DELIVERED — SIGNAL LOST'
      : '● ' + (order.status || 'IN TRANSIT');
    statusBar.appendChild(statusEl);

    var caseEl = document.createElement('div');
    caseEl.className = 'cell-case-number';
    caseEl.textContent = order.orderId || 'D.O.M.O-000';
    statusBar.appendChild(caseEl);

    cell.appendChild(statusBar);

    var overlay = document.createElement('div');
    overlay.className = 'cell-overlay';
    cell.appendChild(overlay);

    setTimeout(function() { drawCellNoise(canvas); }, 100);

    return cell;
  }

  /* ── Auth guard + load orders ── */
  auth.onAuthStateChanged(function(user) {
    const isGuest = localStorage.getItem('domo-guest') === 'true';
    if (isGuest) {
      document.getElementById('surveillance-grid').style.display = 'none';
      document.getElementById('no-orders').style.display = 'flex';
      var noCanvas = document.getElementById('no-signal-canvas');
      if (noCanvas) drawCellNoise(noCanvas);
      var noText = document.getElementById('no-signal-text');
      if (noText) noText.textContent = 'GHOST OPERATIVE \u2014 NO ORDERS ON RECORD';
      return;
    }
    if (!user) {
      window.location.href = 'door.html';
      return;
    }

    db.collection('users')
      .doc(user.uid)
      .collection('orders')
      .orderBy('orderDate', 'desc')
      .get()
      .then(function(snapshot) {
        var orders = [];
        snapshot.forEach(function(doc) {
          orders.push(Object.assign({ id: doc.id }, doc.data()));
        });

        var grid     = document.getElementById('surveillance-grid');
        var noOrders = document.getElementById('no-orders');
        var noCanvas = document.getElementById('no-signal-canvas');

        if (orders.length === 0) {
          grid.style.display = 'none';
          noOrders.style.display = 'flex';
          drawCellNoise(noCanvas);
          return;
        }

        setGridLayout(orders.length);

        orders.forEach(function(order, index) {
          var cell = createCCTVCell(order, index);
          grid.appendChild(cell);
        });
      })
      .catch(function(e) {
        console.error('Error loading orders:', e);
        document.getElementById('surveillance-grid').style.display = 'none';
        var noOrders = document.getElementById('no-orders');
        noOrders.style.display = 'flex';
        var noCanvas = document.getElementById('no-signal-canvas');
        if (noCanvas) drawCellNoise(noCanvas);
      });
  });

  document.getElementById('exit-btn').addEventListener('click', function() {
    localStorage.removeItem('domo-guest');
    localStorage.removeItem('domo-guest-name');
    window.location.href = 'index.html';
  });
  </script>
<script>
(function() {
  window.addEventListener('error', function(event) {
    var ignoredErrors = [
      'Script error',
      'ResizeObserver',
      'Non-Error promise rejection',
      'Loading chunk',
      'Network request failed',
      'favicon',
      'net::ERR'
    ];
    var message = event.message || '';
    var shouldIgnore = ignoredErrors.some(function(ignored) {
      return message.indexOf(ignored) !== -1;
    });
    if (!shouldIgnore) {
      try { sessionStorage.setItem('domo-error', message); } catch(e) {}
      window.location.href = 'error.html';
    }
  });

  window.addEventListener('unhandledrejection', function(event) {
    var reason = event.reason ? event.reason.toString() : '';
    var ignoredErrors = [
      'popup-closed-by-user',
      'cancelled-popup-request',
      'ResizeObserver',
      'Network request failed',
      'net::ERR',
      'Failed to fetch',
      'Load failed'
    ];
    var shouldIgnore = ignoredErrors.some(function(ignored) {
      return reason.indexOf(ignored) !== -1;
    });
    if (!shouldIgnore) {
      try { sessionStorage.setItem('domo-error', reason); } catch(e) {}
      window.location.href = 'error.html';
    }
  });
})();
</script>
</body>
</html>
