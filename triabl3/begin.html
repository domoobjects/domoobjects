<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Begin — TRIBAL TRACES</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />

  <style>
    /* ============================================================
       BEGIN PAGE  —  a single calm breath before entering the site
       Simple by design: one diya, one line, one button.
       ============================================================ */

    html, body { height: 100%; }

    body.begin-page {
      /* dusk — warm charcoal with a soft lamp-glow from center */
      background:
        radial-gradient(ellipse 70% 55% at 50% 52%, rgba(232, 163, 74, 0.14), transparent 65%),
        radial-gradient(ellipse 90% 80% at 50% 52%, rgba(125, 32, 39, 0.10), transparent 75%),
        #1f1c1a;
      color: #f5ebd8;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* very faint painted-wall grain so it feels textured, not flat */
    body.begin-page::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='7'/><feColorMatrix values='0 0 0 0 0.96  0 0 0 0 0.92  0 0 0 0 0.84  0 0 0 0.35 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      opacity: 0.07;
      pointer-events: none;
      z-index: 0;
    }

    /* floating embers drifting upward (decorative) */
    .ember {
      position: fixed;
      bottom: -20px;
      width: 2px;
      height: 2px;
      background: #e8a34a;
      border-radius: 50%;
      opacity: 0;
      box-shadow: 0 0 6px 1px rgba(232, 163, 74, 0.8);
      animation: ember-rise 9s linear infinite;
      pointer-events: none;
      z-index: 1;
    }
    .ember:nth-child(1) { left: 18%; animation-delay: 0s;   animation-duration: 10s; }
    .ember:nth-child(2) { left: 32%; animation-delay: 2.2s; animation-duration: 12s; }
    .ember:nth-child(3) { left: 47%; animation-delay: 4.5s; animation-duration: 9s;  }
    .ember:nth-child(4) { left: 61%; animation-delay: 1.1s; animation-duration: 11s; }
    .ember:nth-child(5) { left: 76%; animation-delay: 3.7s; animation-duration: 13s; }
    .ember:nth-child(6) { left: 88%; animation-delay: 6.2s; animation-duration: 10s; }

    @keyframes ember-rise {
      0%   { opacity: 0; transform: translateY(0)     translateX(0); }
      15%  { opacity: 0.9; }
      85%  { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(-110vh) translateX(30px); }
    }

    /* ── Main stage ───────────────────────────────────────── */
    .begin-stage {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 38px;
      padding: 140px 24px 80px;
      text-align: center;
    }

    .begin-stage > * {
      opacity: 0;
      transform: translateY(12px);
      animation: rise-in 1.1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .begin-stage > *:nth-child(1) { animation-delay: 0.15s; }
    .begin-stage > *:nth-child(2) { animation-delay: 0.55s; }
    .begin-stage > *:nth-child(3) { animation-delay: 0.95s; }
    .begin-stage > *:nth-child(4) { animation-delay: 1.35s; }

    @keyframes rise-in {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── The diya ─────────────────────────────────────────── */
    .diya {
      width: 180px;
      height: 180px;
      position: relative;
    }
    .diya svg { width: 100%; height: 100%; display: block; overflow: visible; }

    /* halo behind the flame */
    .diya-halo {
      fill: url(#halo-grad);
      transform-origin: center;
      animation: halo-breathe 3.5s ease-in-out infinite;
    }
    @keyframes halo-breathe {
      0%, 100% { opacity: 0.55; transform: scale(1);     }
      50%      { opacity: 0.85; transform: scale(1.08);  }
    }

    /* flame body */
    .flame-outer { fill: #e8a34a; transform-origin: 50% 100%; animation: flame-sway 1.6s ease-in-out infinite; }
    .flame-inner { fill: #ffe5a5; transform-origin: 50% 100%; animation: flame-sway 1.3s ease-in-out infinite reverse; }
    .flame-core  { fill: #fffcef; transform-origin: 50% 100%; animation: flame-core-pulse 2s ease-in-out infinite; }

    @keyframes flame-sway {
      0%   { transform: scaleX(1)    skewX(-2deg) translateY(0);   }
      25%  { transform: scaleX(0.96) skewX(1.5deg) translateY(-0.5px); }
      50%  { transform: scaleX(1.03) skewX(2deg)  translateY(-1px); }
      75%  { transform: scaleX(0.98) skewX(-1deg) translateY(-0.3px); }
      100% { transform: scaleX(1)    skewX(-2deg) translateY(0);   }
    }
    @keyframes flame-core-pulse {
      0%, 100% { opacity: 0.9; }
      50%      { opacity: 1;   }
    }

    /* ── The line ─────────────────────────────────────────── */
    .begin-line {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(36px, 6.2vw, 82px);
      line-height: 1.15;
      letter-spacing: 0.005em;
      color: #f5ebd8;
      max-width: 900px;
    }
    .begin-line em {
      font-style: italic;
      color: #e8a34a;
      font-weight: 400;
    }

    /* ── The subtitle ─────────────────────────────────────── */
    .begin-sub {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(245, 235, 216, 0.5);
      padding-top: 10px;
      border-top: 1px solid rgba(245, 235, 216, 0.2);
      min-width: 220px;
      max-width: 360px;
    }

    /* ── Continue button ──────────────────────────────────── */
    .begin-cta {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 16px 34px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid rgba(245, 235, 216, 0.28);
      color: #f5ebd8;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition:
        color 0.3s ease,
        border-color 0.3s ease,
        transform 0.3s ease,
        letter-spacing 0.4s ease;
    }

    .begin-cta::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(201, 75, 58, 0.0), rgba(201, 75, 58, 0.35), rgba(201, 75, 58, 0.0));
      transform: translateX(-100%);
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: -1;
    }

    .begin-cta:hover {
      color: #fff6e3;
      border-color: rgba(245, 235, 216, 0.7);
      transform: translateY(-2px);
      letter-spacing: 0.34em;
    }
    .begin-cta:hover::before { transform: translateX(100%); }

    .begin-cta .arrow {
      display: inline-block;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .begin-cta:hover .arrow { transform: translateX(6px); }

    /* ── Footer whisper ───────────────────────────────────── */
    .begin-whisper {
      position: fixed;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 13px;
      color: rgba(245, 235, 216, 0.32);
      letter-spacing: 0.12em;
      z-index: 2;
      opacity: 0;
      animation: rise-in 1.2s ease 1.8s forwards;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Mobile ───────────────────────────────────────────── */
    @media (max-width: 720px) {
      .begin-stage { gap: 28px; padding: 120px 18px 80px; }
      .diya { width: 140px; height: 140px; }
      .begin-whisper { font-size: 11px; }
    }
  </style>
</head>
<body class="begin-page">

  <!-- ─────────── Drifting embers ─────────── -->
  <span class="ember"></span>
  <span class="ember"></span>
  <span class="ember"></span>
  <span class="ember"></span>
  <span class="ember"></span>
  <span class="ember"></span>

  <!-- ─────────── The stage ─────────── -->
  <main class="begin-stage">

    <!-- 1) Diya (SVG, flickering flame) -->
    <div class="diya" aria-hidden="true">
      <svg viewBox="0 0 180 180">
        <defs>
          <radialGradient id="halo-grad" cx="50%" cy="62%" r="55%">
            <stop offset="0%"   stop-color="#ffcf7a" stop-opacity="0.55"/>
            <stop offset="35%"  stop-color="#e8a34a" stop-opacity="0.28"/>
            <stop offset="100%" stop-color="#e8a34a" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="bowl-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#6a3a28"/>
            <stop offset="100%" stop-color="#2e1812"/>
          </linearGradient>
        </defs>

        <!-- glowing halo around the flame -->
        <circle class="diya-halo" cx="90" cy="108" r="56"/>

        <!-- flame — three nested teardrops -->
        <g transform="translate(90 104)">
          <path class="flame-outer"
                d="M0 -40 C -14 -20, -16 -5, -8 6 C -4 12, 4 12, 8 6 C 16 -5, 14 -20, 0 -40 Z"/>
          <path class="flame-inner"
                d="M0 -28 C -8 -14, -10 -3, -4 5 C -1 9, 1 9, 4 5 C 10 -3, 8 -14, 0 -28 Z"/>
          <path class="flame-core"
                d="M0 -16 C -3 -8, -4 -1, -1 3 C 0 4.5, 0 4.5, 1 3 C 4 -1, 3 -8, 0 -16 Z"/>
        </g>

        <!-- wick -->
        <rect x="88" y="104" width="4" height="14" fill="#2a1610" rx="1"/>

        <!-- oil lamp bowl (stylized terracotta) -->
        <path d="M30 118 Q 90 100, 150 118 Q 146 140, 90 148 Q 34 140, 30 118 Z"
              fill="url(#bowl-grad)" stroke="#1a0e0a" stroke-width="1.2"/>
        <!-- bowl rim highlight -->
        <path d="M36 120 Q 90 104, 144 120" fill="none" stroke="#a86a42" stroke-width="1.1" opacity="0.7"/>

        <!-- base plate -->
        <ellipse cx="90" cy="150" rx="64" ry="5" fill="rgba(0,0,0,0.35)"/>
      </svg>
    </div>

    <!-- 2) The line -->
    <h1 class="begin-line">
      Before we begin,<br/>
      <em>take a breath.</em>
    </h1>

    <!-- 3) Subtitle -->
    <p class="begin-sub">a quiet moment, then we step inward</p>

    <!-- 4) Continue -->
    <a href="getin.html" class="begin-cta">
      <span>Continue</span>
      <span class="arrow">→</span>
    </a>

  </main>

  <!-- A small italic whisper at the bottom -->
  <div class="begin-whisper">— दीपो ज्योतिः परं ब्रह्म / the lamp is the highest light —</div>
