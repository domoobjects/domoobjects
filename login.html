<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access Terminal - DOMO</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #0d0d0b; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; }
    #crtCanvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.18; }
    #scanlines { position: fixed; inset: 0; z-index: 1; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px); pointer-events: none; }
    #vignette { position: fixed; inset: 0; z-index: 2; background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%); pointer-events: none; }
    #redTint { position: fixed; inset: 0; z-index: 3; background: rgba(193,18,31,0.12); opacity: 0; pointer-events: none; }
    #glitchLine { position: fixed; left: 0; width: 100vw; height: 1px; background: rgba(255,255,255,0.15); z-index: 4; opacity: 0; pointer-events: none; transform: scaleX(0); transform-origin: left center; }
    #blackCover { position: fixed; inset: 0; background: #0d0d0b; z-index: 20; opacity: 0; pointer-events: none; }
    #loginCard { position: relative; z-index: 10; width: 380px; padding: 52px 48px; background: rgba(10,10,9,0.72); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 0.5px solid rgba(255,255,255,0.07); }
    .card-logo { display: block; height: 32px; width: auto; opacity: 0.5; margin: 0 auto 32px; }
    .card-heading { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 6px; color: #d4d4cc; text-align: center; display: block; margin-bottom: 6px; }
    .card-sub { font-size: 9px; letter-spacing: 2px; color: #3a3a38; text-align: center; display: block; margin-bottom: 40px; }
    .field { width: 100%; background: rgba(255,255,255,0.03); border: 0.5px solid #1e1e1c; color: #d4d4cc; font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 14px 16px; outline: none; border-radius: 0; display: block; }
    .field::placeholder { color: #2a2a28; }
    .field:focus { border-color: #3a3a38; }
    .field + .field { margin-top: 12px; }
    .field-row { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
    .remember-label { display: flex; align-items: center; gap: 6px; font-size: 8px; letter-spacing: 1px; color: #3a3a38; cursor: pointer; }
    .remember-label input[type=checkbox] { accent-color: #3a3a38; width: 10px; height: 10px; cursor: pointer; }
    .lost-access { font-size: 8px; letter-spacing: 1px; color: #3a3a38; text-decoration: none; transition: color 0.15s; cursor: pointer; }
    .lost-access:hover { color: #d4d4cc; }
    #submitBtn { display: block; width: 100%; margin-top: 32px; background: #d4d4cc; color: #0d0d0b; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 4px; padding: 14px; border: none; border-radius: 0; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    #submitBtn:hover { background: #ffffff; }
    #submitBtn:active { transform: scale(0.98); }
    .card-footer { font-size: 8px; letter-spacing: 1px; color: #2a2a28; text-align: center; margin-top: 20px; display: block; }
    .card-footer .req { color: #2a2a28; cursor: pointer; transition: color 0.15s; }
    .card-footer .req:hover { color: #3a3a38; }
    #errorMsg { font-size: 9px; letter-spacing: 1px; color: #c1121f; margin-top: 10px; display: none; font-family: 'IBM Plex Mono', monospace; }
    #googleBtn { display: block; width: 100%; margin-top: 10px; background: #ffffff; color: #0d0d0b; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 14px; border: 0.5px solid #1e1e1c; border-radius: 0; cursor: pointer; transition: background 0.15s; }
    #googleBtn:hover { background: #f5f5f5; }
    #googleErrorMsg { font-size: 9px; letter-spacing: 1px; color: #c1121f; margin-top: 10px; display: none; font-family: 'IBM Plex Mono', monospace; }
  
    /* ── Back button ── */
    .domo-back-btn {
      position: fixed;
      bottom: 28px;
      left: 36px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: 3px;
      color: #3a3a38;
      text-transform: uppercase;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 100;
      transition: color 300ms;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .domo-back-btn:hover { color: #c1121f; }
    .domo-back-btn::before {
      content: '';
      display: block;
      width: 20px;
      height: 0.5px;
      background: currentColor;
      transition: width 300ms;
    }
    .domo-back-btn:hover::before { width: 30px; }

    /* ── Torch password reveal ── */
    .password-wrapper { position: relative; width: 100%; }
    .password-wrapper input { width: 100%; padding-right: 36px; }
    .torch-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; z-index: 2; user-select: none; -webkit-user-select: none; }
    .torch-btn:focus { outline: none; }
    .torch-beam { transition: opacity 100ms; }
    .torch-btn.active .torch-beam { opacity: 1; }
    .password-field-reveal { position: relative; overflow: hidden; }
    .torch-light-overlay { position: absolute; top: 0; left: -100%; width: 60px; height: 100%; background: radial-gradient(ellipse 30px 100% at center, rgba(255,251,230,0.12) 0%, rgba(255,251,230,0.06) 40%, transparent 100%); pointer-events: none; z-index: 1; opacity: 0; transition: opacity 150ms; }
    .torch-light-overlay.active { opacity: 1; animation: torchSweep 600ms cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes torchSweep { 0% { left: -60px; } 100% { left: calc(100% - 36px); } }
  </style>
<style>
@keyframes signalBar {
  0%   { width: 0%; opacity: 1; }
  85%  { width: 100%; opacity: 1; }
  100% { width: 100%; opacity: 0; }
}
#signal-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 1.5px;
  width: 0%;
  background: #c1121f;
  z-index: 9999;
  animation: signalBar 400ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
  pointer-events: none;
}
</style>

<body>

<button class="domo-back-btn" onclick="window.location.href='door.html'">return to door</button>

<div id="guestCinematic" style="position:fixed;inset:0;background:#0d0d0b;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 400ms;"></div>
<div id="loginCard">

    <input id="emailField" class="field" type="text" placeholder="identifier" autocomplete="off"/>

      <div class="torch-light-overlay"></div>

                <line x1="8" y1="3.5" x2="5" y2="1.5" stroke="#fffbe6" stroke-width="0.5" stroke-linecap="round" opacity="0.6"/>
                <line x1="8" y1="3.5" x2="11" y2="1.5" stroke="#fffbe6" stroke-width="0.5" stroke-linecap="round" opacity="0.6"/>

            </svg>
          </button>

    </div>

    <button id="googleBtn" type="button">Continue with Google</button>
    <div id="googleErrorMsg">Access denied &mdash; try again</div>
  </form>
  <span class="card-footer">No account? <span class="req">Request access</span></span>
</div>
<script>
var canvas = document.getElementById('crtCanvas');
var ctx = canvas.getContext('2d');
var redTint = document.getElementById('redTint');
var W, H, imgData;
var state = 'CALM';
var noiseMax = 80, targetMax = 80;
var canvasOpacity = 0.18, targetOpacity = 0.18;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  imgData = ctx.createImageData(W, H);
}
resize();
window.addEventListener('resize', resize);

function drawNoise() {
  var data = imgData.data;
  var max = noiseMax | 0;
  for (var i = 0; i < data.length; i += 4) {
    var v = (Math.random() * max) | 0;
    data[i] = data[i+1] = data[i+2] = v;
    data[i+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
}

function loop() {
  requestAnimationFrame(loop);
  if (Math.abs(noiseMax - targetMax) > 0.3) noiseMax += (targetMax - noiseMax) * 0.04;
  else noiseMax = targetMax;
  if (Math.abs(canvasOpacity - targetOpacity) > 0.002) {
    canvasOpacity += (targetOpacity - canvasOpacity) * 0.06;
    canvas.style.opacity = canvasOpacity.toFixed(3);
  }
  drawNoise();
}
requestAnimationFrame(loop);

function setChaos() {
  if (state === 'CLEARING') return;
  state = 'CHAOS';
  targetMax = 255; targetOpacity = 0.65;
  canvas.style.filter = 'contrast(1.4)';
  redTint.style.transition = 'none';
  redTint.style.opacity = '1';
  setTimeout(function() { redTint.style.transition = 'opacity 400ms ease'; redTint.style.opacity = '0'; }, 800);
  setTimeout(function() { state = 'CALM'; targetMax = typingMax(); targetOpacity = 0.18; canvas.style.filter = ''; }, 1200);
}

function setClearing() {
  state = 'CLEARING';
  targetOpacity = 0; targetMax = 0;
  canvas.style.filter = '';
  var sl = document.getElementById('scanlines');
  var vg = document.getElementById('vignette');
  sl.style.transition = vg.style.transition = 'opacity 1200ms ease';
  sl.style.opacity = vg.style.opacity = '0';
  var card = document.getElementById('loginCard');
  setTimeout(function() { card.style.transition = 'opacity 400ms ease'; card.style.opacity = '0'; }, 1200);
  var cover = document.getElementById('blackCover');
  cover.style.pointerEvents = 'all';
  setTimeout(function() { cover.style.transition = 'opacity 300ms ease'; cover.style.opacity = '1'; }, 1600);
  setTimeout(function() { window.location.href = 'index.html'; }, 2000);
}

var charCount = 0, typingTimer = null, driftTimer = null;
function typingMax() { return Math.max(40, 80 - charCount * 1.5); }

function onType() {
  charCount++;
  if (state === 'CALM') targetMax = typingMax();
  document.getElementById('errorMsg').style.display = 'none';
  clearTimeout(typingTimer); clearInterval(driftTimer);
  typingTimer = setTimeout(function() {
    var start = noiseMax, end = 80, steps = 60, step = 0;
    driftTimer = setInterval(function() {
      step++;
      targetMax = start + (end - start) * (step / steps);
      if (step >= steps) { clearInterval(driftTimer); charCount = 0; }
    }, 2000 / steps);
  }, 3000);
}
document.getElementById('emailField').addEventListener('input', onType);
document.getElementById('passwordField').addEventListener('input', onType);



function scheduleFlicker() {
  setTimeout(function() {
    document.body.style.transition = 'opacity 40ms ease';
    document.body.style.opacity = '0.92';
    setTimeout(function() {
      document.body.style.opacity = '1';
      setTimeout(function() { document.body.style.transition = ''; scheduleFlicker(); }, 80);
    }, 40);
  }, 4000 + Math.random() * 4000);
}
scheduleFlicker();

var gl = document.getElementById('glitchLine');
function scheduleGlitch() {
  setTimeout(function() {
    gl.style.top = (Math.random() * window.innerHeight) + 'px';
    gl.style.transition = 'none';
    gl.style.opacity = '1';
    gl.style.transform = 'scaleX(0)';
    requestAnimationFrame(function() { requestAnimationFrame(function() {
      gl.style.transition = 'transform 200ms linear';
      gl.style.transform = 'scaleX(1)';
      setTimeout(function() {
        gl.style.transition = 'opacity 200ms ease';
        gl.style.opacity = '0';
        setTimeout(scheduleGlitch, 300);
      }, 200);
    }); });
  }, 6000 + Math.random() * 6000);
}
scheduleGlitch();
</script>

<script>
/* ── FIREBASE + AUTH ── */
var firebaseConfig = {
  apiKey: "AIzaSyA6_5oWBRKZLnZhTsjtfepm2NleAEEsrPA",
  authDomain: "domo-8cfe1.firebaseapp.com",
  projectId: "domo-8cfe1",
  storageBucket: "domo-8cfe1.firebasestorage.app",
  messagingSenderId: "47790816831",
  appId: "1:47790816831:web:0a92e160fc595d5a9c428a",
  measurementId: "G-JD9B01Q5QN"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

/* ── Helpers ── */
function showError(message) {
  var el = document.getElementById('errorMsg');
  if (el) { el.textContent = message; el.style.display = 'block'; el.style.opacity = '1'; }
}
function hideError() {
  var el = document.getElementById('errorMsg');
  if (el) { el.style.display = 'none'; el.style.opacity = '0'; el.textContent = ''; }
}
function triggerClearingAnimation() { setClearing(); }

/* ── Email / password login ── */
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var email    = document.getElementById('emailField').value.trim();
  var password = document.getElementById('passwordField').value;
  if (!email || !password) return;
  hideError();
  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(function(result) {
      localStorage.setItem('domo-cached-user', JSON.stringify({
        displayName: result.user.displayName,
        email: result.user.email,
        photoURL: result.user.photoURL,
        uid: result.user.uid
      }));
      triggerClearingAnimation();
    })
    .catch(function(error) {
      if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
        showError('Signal rejected — credentials not recognised');
      } else {
        showError('Signal rejected — ' + error.message);
      }
      setChaos();
    });
});

/* ── Google login ── */
document.getElementById('googleBtn').addEventListener('click', function() {
  var provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
    .then(function(result) {
      var isNew = result.additionalUserInfo && result.additionalUserInfo.isNewUser;
      var user = result.user;
      db.collection('users').doc(user.uid).set({
        name: user.displayName,
        email: user.email,
        photoURL: user.photoURL,
        lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
        isNewUser: isNew
      }, { merge: true }).then(function() {
        localStorage.setItem('domo-cached-user', JSON.stringify({
          displayName: user.displayName,
          email: user.email,
          photoURL: user.photoURL,
          uid: user.uid
        }));
        triggerClearingAnimation();
      });
    })
    .catch(function(error) {
      if (error.code !== 'auth/popup-closed-by-user') {
        showError('signal lost — google access failed');
      }
    });
});
</script>

<script>
(function() {
  window.addEventListener('error', function(event) {
    var ignoredErrors = [
      'Script error',
      'ResizeObserver',
      'Non-Error promise rejection',
      'Loading chunk',
      'Network request failed',
      'favicon',
      'net::ERR'
    ];
    var message = event.message || '';
    var shouldIgnore = ignoredErrors.some(function(ignored) {
      return message.indexOf(ignored) !== -1;
    });
    if (!shouldIgnore) {
      try { sessionStorage.setItem('domo-error', message); } catch(e) {}
      window.location.href = 'error.html';
    }
  });

  window.addEventListener('unhandledrejection', function(event) {
    var reason = event.reason ? event.reason.toString() : '';
    var ignoredErrors = [
      'popup-closed-by-user',
      'cancelled-popup-request',
      'ResizeObserver',
      'Network request failed',
      'net::ERR',
      'Failed to fetch',
      'Load failed'
    ];
    var shouldIgnore = ignoredErrors.some(function(ignored) {
      return reason.indexOf(ignored) !== -1;
    });
    if (!shouldIgnore) {
      try { sessionStorage.setItem('domo-error', reason); } catch(e) {}
      window.location.href = 'error.html';
    }
  });
})();
</script>
<script>
/* ── GUEST MODE ── */
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('guest') !== 'true') return;

  /* Yellow top bar */
  var bar = document.createElement('div');
  bar.style.cssText = 'position:fixed;top:0;left:0;right:0;height:28px;background:#f5c518;display:flex;align-items:center;justify-content:center;z-index:100;font-family:"IBM Plex Mono",monospace;font-size:8px;letter-spacing:3px;color:#0d0d0b;text-transform:uppercase;pointer-events:none;';
  bar.textContent = '[ GUEST ACCESS \u2014 TEMPORARY CLEARANCE ]';
  document.body.appendChild(bar);

  /* Push card down */
  var card = document.getElementById('loginCard');
  card.style.marginTop = '28px';

  /* Update heading/sub */
  card.querySelector('.card-heading').textContent = 'Ghost Access';

  /* Typewriter on subtitle */
  var sub = card.querySelector('.card-sub');
  sub.textContent = '';
  var subText = 'type to generate your ghost credentials';
  var i = 0;
  var tw = setInterval(function() {
    sub.textContent += subText[i]; i++;
    if (i >= subText.length) clearInterval(tw);
  }, 55);

  /* Hide Google button, errors, field-row, footer */
  document.getElementById('googleBtn').style.display = 'none';
  document.getElementById('googleErrorMsg').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';
  document.querySelector('.field-row').style.display = 'none';
  card.querySelector('.card-footer').style.display = 'none';

  /* Style submit button yellow */
  var submitBtn = document.getElementById('submitBtn');
  submitBtn.textContent = 'Enter as Ghost';
  submitBtn.style.background = '#f5c518';
  submitBtn.style.color = '#0d0d0b';

  /* FIX 1 — Auto-type on email and password fields */
  var emailInput = document.getElementById('emailField');
  var passwordInput = document.getElementById('passwordField');
  var emailMessage = 'UNKNOWN OPERATIVE \u2014 UNREGISTERED';
  var passwordMessage = 'UNKNOWN-OPERATIVE-004';
  var emailIndex = 0;
  var passwordIndex = 0;
  emailInput.value = '';
  passwordInput.value = '';
  emailInput.addEventListener('keydown', function(e) {
    e.preventDefault();
    if (emailIndex < emailMessage.length) {
      emailInput.value = emailMessage.slice(0, emailIndex + 1);
      emailIndex++;
    }
  });
  passwordInput.addEventListener('keydown', function(e) {
    e.preventDefault();
    if (passwordIndex < passwordMessage.length) {
      passwordInput.value = passwordMessage.slice(0, passwordIndex + 1);
      passwordIndex++;
    }
  });
  emailInput.addEventListener('paste', function(e) { e.preventDefault(); });
  passwordInput.addEventListener('paste', function(e) { e.preventDefault(); });

  /* FIX 2 — Ghost transmission cinematic */
  var cinematicTimeouts = [];
  function ct(fn, delay) {
    var id = setTimeout(fn, delay);
    cinematicTimeouts.push(id);
    return id;
  }

  function skipTransmission() {
    cinematicTimeouts.forEach(function(id) { clearTimeout(id); });
    cinematicTimeouts = [];
    var cinematic = document.getElementById('guestCinematic');
    if (cinematic) {
      cinematic.style.opacity = '0';
      setTimeout(function() {
        cinematic.style.display = 'none';
        localStorage.setItem('domo-guest', 'true');
        window.location.href = 'index.html';
      }, 400);
    }
  }

  function triggerGuestCinematic() {
    var overlay = document.getElementById('guestCinematic');
    overlay.innerHTML = '';
    overlay.style.display = 'flex';
    overlay.style.opacity = '0';

    /* skip button */
    var skipBtn = document.createElement('div');
    skipBtn.id = 'skip-btn';
    skipBtn.style.cssText = 'position:fixed;bottom:36px;right:36px;cursor:pointer;display:flex;flex-direction:column;align-items:flex-end;gap:8px;z-index:10000;';
    skipBtn.innerHTML =
      '<div style="display:flex;align-items:center;gap:10px;">' +
        '<div id="skip-text" style="font-family:\'IBM Plex Mono\',monospace;font-size:8px;letter-spacing:4px;color:#3a3a38;text-transform:uppercase;transition:color 300ms;">interrupt transmission</div>' +
        '<div id="skip-line" style="width:24px;height:0.5px;background:#3a3a38;transition:all 300ms;"></div>' +
      '</div>' +
      '<div id="skip-box" style="border:0.5px solid #2a2a28;padding:8px 16px;transition:all 300ms;">' +
        '<span id="skip-label" style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;letter-spacing:3px;color:#3a3a38;text-transform:uppercase;transition:color 300ms;">[ skip ]</span>' +
      '</div>';
    skipBtn.addEventListener('mouseenter', function() {
      document.getElementById('skip-text').style.color = '#d4d4cc';
      document.getElementById('skip-line').style.background = '#c1121f';
      document.getElementById('skip-line').style.width = '40px';
      document.getElementById('skip-box').style.borderColor = '#c1121f';
      document.getElementById('skip-label').style.color = '#c1121f';
    });
    skipBtn.addEventListener('mouseleave', function() {
      document.getElementById('skip-text').style.color = '#3a3a38';
      document.getElementById('skip-line').style.background = '#3a3a38';
      document.getElementById('skip-line').style.width = '24px';
      document.getElementById('skip-box').style.borderColor = '#2a2a28';
      document.getElementById('skip-label').style.color = '#3a3a38';
    });
    skipBtn.addEventListener('click', skipTransmission);
    overlay.appendChild(skipBtn);

    var machineWrap = document.createElement('div');
    machineWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:40px;';
    overlay.appendChild(machineWrap);

    var machine = document.createElement('div');
    machine.style.cssText = 'width:320px;height:180px;background:#1a1a18;border:0.5px solid #2a2a28;border-radius:8px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;';

    var tape = document.createElement('div');
    tape.style.cssText = 'width:120px;height:40px;background:#111;border:0.5px solid #2a2a28;border-radius:4px;position:relative;overflow:hidden;';

    var reel1 = document.createElement('div');
    reel1.style.cssText = 'position:absolute;left:15px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:2px solid #3a3a38;border-radius:50%;animation:spin 2s linear infinite;';

    var reel2 = document.createElement('div');
    reel2.style.cssText = 'position:absolute;right:15px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:2px solid #3a3a38;border-radius:50%;animation:spin 2s linear infinite reverse;';

    tape.appendChild(reel1);
    tape.appendChild(reel2);

    var light = document.createElement('div');
    light.style.cssText = 'width:10px;height:10px;background:#f5c518;border-radius:50%;animation:blinkLight 800ms ease-in-out infinite;';

    var label = document.createElement('div');
    label.style.cssText = 'font-family:IBM Plex Mono,monospace;font-size:7px;letter-spacing:2px;color:#3a3a38;text-transform:uppercase;';
    label.textContent = 'D.O.M.O GHOST TRANSMISSION';

    machine.appendChild(tape);
    machine.appendChild(light);
    machine.appendChild(label);
    machineWrap.appendChild(machine);

    var style = document.createElement('style');
    style.textContent = '@keyframes spin{to{transform:translateY(-50%) rotate(360deg)}}@keyframes blinkLight{0%,100%{opacity:1}50%{opacity:0.2}}';
    document.head.appendChild(style);

    var textContainer = document.createElement('div');
    textContainer.style.cssText = 'text-align:center;max-width:400px;';
    machineWrap.appendChild(textContainer);

    ct(function() { overlay.style.opacity = '1'; }, 10);

    var lines = [
      'ghost signal detected.',
      'no file exists for this operative.',
      'temporary clearance has been issued.',
      'the department sees you but does not know you.',
      'browse carefully.'
    ];

    var lineIndex = 0;
    var charIndex = 0;
    var currentLineEl = null;

    function typeLine() {
      if (lineIndex >= lines.length) {
        var finalLine = document.createElement('div');
        finalLine.style.cssText = 'font-family:IBM Plex Mono,monospace;font-size:9px;letter-spacing:3px;color:#3a3a38;margin-top:16px;opacity:0;transition:opacity 600ms;';
        finalLine.textContent = '[ ghost clearance confirmed ]';
        textContainer.appendChild(finalLine);
        ct(function() { finalLine.style.opacity = '1'; }, 100);
        ct(function() {
          overlay.style.opacity = '0';
          ct(function() {
            localStorage.setItem('domo-guest', 'true');
            window.location.href = 'index.html';
          }, 800);
        }, 2000);
        return;
      }
      if (charIndex === 0) {
        currentLineEl = document.createElement('div');
        currentLineEl.style.cssText = 'font-family:IBM Plex Mono,monospace;font-size:13px;color:#d4d4cc;line-height:2;';
        textContainer.appendChild(currentLineEl);
      }
      if (charIndex < lines[lineIndex].length) {
        currentLineEl.textContent = lines[lineIndex].slice(0, charIndex + 1);
        charIndex++;
        ct(typeLine, 55);
      } else {
        charIndex = 0;
        lineIndex++;
        ct(typeLine, 600);
      }
    }

    ct(typeLine, 500);
  }

  /* Override form submit */
  var form = document.getElementById('loginForm');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    triggerGuestCinematic();
  });
})();
</script>
<script>
document.querySelectorAll('.torch-btn').forEach(function(btn) {
  var wrapper = btn.closest('.password-wrapper');
  var input   = wrapper.querySelector('input');
  var overlay = wrapper.querySelector('.torch-light-overlay');
  function startReveal() {
    input.type = 'text';
    btn.classList.add('active');
    overlay.classList.remove('active');
    void overlay.offsetWidth;
    overlay.classList.add('active');
  }
  function endReveal() {
    input.type = 'password';
    btn.classList.remove('active');
    overlay.classList.remove('active');
  }
  btn.addEventListener('mousedown', function(e) { e.preventDefault(); startReveal(); });
  btn.addEventListener('mouseup', endReveal);
  btn.addEventListener('mouseleave', endReveal);
  btn.addEventListener('touchstart', function(e) { e.preventDefault(); startReveal(); }, { passive: false });
  btn.addEventListener('touchend', endReveal);
  btn.addEventListener('touchcancel', endReveal);
});
</script>
</body>
</html>
